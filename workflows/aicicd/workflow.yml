schema_version: "1.0"
workflow:
  id: "aicicd"
  name: "AI-Powered CICD Pipeline"
  version: "1.0.0"
  author: "AIDev Team"
  description: "Intelligent CI/CD pipeline with AI-driven build analysis, auto-fix, test analysis, deploy decision, and canary release"

requires:
  pdca_version: ">=0.8.5"
  integrations:
    any:
      - "claude"
      - "copilot"
      - "gemini"
      - "opencode"

inputs:
  repo:
    type: string
    required: true
    prompt: "GitHub repository (owner/repo)"
  pr_number:
    type: number
    required: false
    prompt: "PR number (if triggered by PR)"
  branch:
    type: string
    default: "main"
    prompt: "Target branch for deployment"
  canary_percent:
    type: number
    default: 10
    prompt: "Initial canary traffic percentage (0-100)"
  auto_deploy:
    type: boolean
    default: false
    prompt: "Enable automatic deployment on success"

steps:
  # ========== Phase 1: AI Build ==========
  - id: ai-build
    command: pdca.prompt
    integration: "{{ inputs.integration | default('auto') }}"
    input:
      args: |
        You are an AI CICD assistant. A build has been triggered for {{ inputs.repo }}.
        
        Steps:
        1. Check if this is a new build or a rebuild after fix
        2. Run the build command (npm run build / cargo build / go build etc.)
        3. If build succeeds, proceed to ai-test
        4. If build fails, capture the FULL build log and call ai-analyze-build-log
        
        Execute the build now.

  - id: ai-analyze-build-log
    type: "if"
    condition: "{{ steps['ai-build'].exit_code != 0 }}"
    then:
      - id: analyze-build-failure
        command: pdca.prompt
        integration: "{{ inputs.integration | default('auto') }}"
        input:
          args: |
            The build has failed. Here is the build log:
            
            {{ steps['ai-build'].output }}
            
            Analyze the build failure:
            1. Identify the root cause (syntax error, missing dependency, config error, etc.)
            2. Classify the error type
            3. Propose a specific fix
            4. Apply the fix to the codebase
            5. Commit the fix with message "fix: [AI] auto-fix build failure"
            
            Then re-run the build to verify the fix.
      - id: rerun-build-after-fix
        command: pdca.prompt
        integration: "{{ inputs.integration | default('auto') }}"
        input:
          args: "Re-run the build after the AI fix. Report success or failure."
    else:
      - id: build-success
        command: pdca.prompt
        integration: "{{ inputs.integration | default('auto') }}"
        input:
          args: "Build succeeded. Proceeding to test phase."

  # ========== Phase 2: AI Test ==========
  - id: ai-test
    command: pdca.prompt
    integration: "{{ inputs.integration | default('auto') }}"
    input:
      args: |
        Run the test suite:
        1. Execute tests (npm test / pytest / go test etc.)
        2. Capture test results and coverage
        3. If all tests pass, proceed to ai-deploy-decision
        4. If tests fail, call ai-analyze-test-failure

  - id: ai-analyze-test-failure
    type: "if"
    condition: "{{ steps['ai-test'].exit_code != 0 }}"
    then:
      - id: analyze-test-failure
        command: pdca.prompt
        integration: "{{ inputs.integration | default('auto') }}"
        input:
          args: |
            Tests have failed. Here are the test results:
            
            {{ steps['ai-test'].output }}
            
            Analyze the test failures:
            1. Identify which tests failed and why
            2. Classify: is this a code bug, a test bug, or an environment issue?
            3. Propose and apply fixes
            4. Commit fixes with message "fix: [AI] auto-fix test failure"
            5. Re-run tests to verify
            
            Note: If the fix requires changing test expectations (not code), that's acceptable.
      - id: rerun-tests-after-fix
        command: pdca.prompt
        integration: "{{ inputs.integration | default('auto') }}"
        input:
          args: "Re-run tests after AI fix. Report results."
    else:
      - id: test-success
        command: pdca.prompt
        integration: "{{ inputs.integration | default('auto') }}"
        input:
          args: "All tests passed. Proceeding to deploy decision."

  # ========== Phase 3: AI Deploy Decision ==========
  - id: ai-deploy-decision
    command: pdca.prompt
    integration: "{{ inputs.integration | default('auto') }}"
    input:
      args: |
        Make a deployment decision based on these factors:
        
        ## Build Status
        {{ steps['ai-build'].status }}
        
        ## Test Results
        {{ steps['ai-test'].output | truncate(500) }}
        
        ## Code Coverage (if available)
        [Extract from test output]
        
        ## Risk Assessment
        - How many files changed?
        - Are there database migrations?
        - Are there config changes?
        - Is this a major version change?
        
        ## Decision
        Based on the above, decide:
        - APPROVE: Safe to deploy
        - CANARY: Deploy to canary first (5-10% traffic)
        - REJECT: Do not deploy, needs human review
        
        Output decision in this format:
        DECISION: <APPROVE|CANARY|REJECT>
        REASON: <explanation>
        NEXT_ACTION: <deploy-full|deploy-canary|abort>

  - id: check-deploy-decision
    type: "switch"
    expression: "{{ steps['ai-deploy-decision'].output | regex_search('DECISION:\\s*(\\w+)') | group(1) | upper }}"
    cases:
      "APPROVE":
        - id: deploy-full
          command: pdca.shell
          input:
            args: "echo 'Deploying to production (full traffic)' && {{ env.DEPLOY_COMMAND | default('echo SKIP_DEPLOY') }}"
      "CANARY":
        - id: deploy-canary
          command: pdca.shell
          input:
            args: "echo 'Deploying canary ({{ inputs.canary_percent }}% traffic)' && {{ env.CANARY_DEPLOY_COMMAND | default('echo SKIP_CANARY') }}"
      "REJECT":
        - id: abort-deploy
          command: pdca.prompt
          integration: "{{ inputs.integration | default('auto') }}"
          input:
            args: "Deployment rejected by AI. Create a GitHub Issue explaining the rejection reason and what needs human review."

  # ========== Phase 4: Post-Deploy Monitoring (AIOps handoff) ==========
  - id: post-deploy-monitor
    command: pdca.prompt
    integration: "{{ inputs.integration | default('auto') }}"
    input:
      args: |
        Post-deployment monitoring setup:
        
        1. Log deployment event to AIOps system
        2. Set up automated rollback trigger if error rate exceeds threshold
        3. Monitor key metrics for 10 minutes post-deploy
        4. If canary deploy, prepare auto-promotion to full traffic after success
        
        This hands off to the AIOps layer for ongoing monitoring.
