# Coding Agent Context Extension Configuration
# These values are populated automatically by `pdca init` and
# `pdca integration use` / `pdca integration install`.

# Path (relative to the project root) to the coding agent context file
# managed by this extension (e.g. CLAUDE.md, AGENTS.md,
# .github/copilot-instructions.md). Set automatically from the active
# integration and regenerated during `pdca init` or integration switches.
context_file: ""

# Delimiters for the managed PDCA Kit section.
# Edit these to use custom markers.
context_markers:
  start: "<!-- PDCA START -->"
  end: "<!-- PDCA END -->"
