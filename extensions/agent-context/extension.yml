schema_version: "1.0"

extension:
  id: agent-context
  name: "Coding Agent Context"
  version: "1.0.0"
  description: "Manages coding agent context/instruction files (e.g., CLAUDE.md, copilot-instructions.md) with project-specific plan references and configurable markers"
  author: pdca-kit-core
  repository: https://github.com/github/pdca-kit
  license: MIT

requires:
  pdca_version: ">=0.2.0"

provides:
  commands:
    - name: pdca.agent-context.update
      file: commands/pdca.agent-context.update.md
      description: "Refresh the managed PDCA Kit section in the coding agent context file"

hooks:
  after_define:
    command: pdca.agent-context.update
    optional: true
    description: "Refresh agent context after specification"
  after_plan:
    command: pdca.agent-context.update
    optional: true
    description: "Refresh agent context after planning"

tags:
  - "agent"
  - "context"
  - "core"
